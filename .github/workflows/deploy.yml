name: Build, Push & Deploy to Minikube

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build Images → Push → Deploy
    runs-on: ubuntu-latest
    env:
      API_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/kisaansakhi-api
      WEB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/kisaansakhi-web
      NAMESPACE: kisaansakhi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Docker Hub authentication
      # -----------------------------------------------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Build & push API image
      # -----------------------------------------------------------------------
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

      # -----------------------------------------------------------------------
      # Build & push Web image
      # -----------------------------------------------------------------------
      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}

      # -----------------------------------------------------------------------
      # Configure kubectl from the base64-encoded kubeconfig secret
      # -----------------------------------------------------------------------
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      # -----------------------------------------------------------------------
      # Apply all manifests (drip-feed to protect free tunnel proxies)
      # -----------------------------------------------------------------------
      - name: Apply Kubernetes manifests safely
        run: |
          csplit -s -z -f resource k8s/architecture.yaml '/---/' '{*}'
          for file in resource*; do
            echo "Deploying chunk: $file"
            kubectl apply -f "$file" --validate=false
            sleep 2
          done
          rm resource*

      # -----------------------------------------------------------------------
      # Pin both deployments to SHA tag and monitor rollouts
      # -----------------------------------------------------------------------
      - name: Roll out API deployment with new image
        run: |
          kubectl set image deployment/api-deployment \
            api=${{ env.API_IMAGE }}:${{ github.sha }} \
            --namespace ${{ env.NAMESPACE }}
          kubectl rollout status deployment/api-deployment \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=120s

      - name: Roll out Web deployment with new image
        run: |
          kubectl set image deployment/web-deployment \
            web=${{ env.WEB_IMAGE }}:${{ github.sha }} \
            --namespace ${{ env.NAMESPACE }}
          kubectl rollout status deployment/web-deployment \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=120s
