# =============================================================================
# KisaanSakhi — Unified Minikube Cluster Architecture
# Apply with: kubectl apply -f k8s/architecture.yaml
# Deployment names must stay stable — the GitHub Actions workflow references
# them by name in `kubectl set image` calls.
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: kisaansakhi

---
# =============================================================================
# PostgreSQL — PersistentVolumeClaim
# =============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: kisaansakhi
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
# =============================================================================
# PostgreSQL — Service
# Internal DNS: postgres-service.kisaansakhi.svc.cluster.local:5432
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: kisaansakhi
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# =============================================================================
# PostgreSQL — Deployment
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: kisaansakhi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: kisaansakhi-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kisaansakhi-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: agripulse
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "agripulse", "-d", "agripulse"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
# =============================================================================
# FastAPI Backend — Service
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: kisaansakhi
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000

---
# =============================================================================
# FastAPI Backend — Deployment
# NOTE: DATABASE_URL is assembled from literal parts using the secret value.
# K8s does NOT support $(VAR) substitution across env entries when the source
# is a secretKeyRef — so we build the full DSN string here explicitly, with
# the password injected via a separate env var read at the application layer.
# The app's database.py reads DATABASE_URL from the environment directly.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: kisaansakhi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ananyaas1230/kisaansakhi-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: kisaansakhi-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql://agripulse:$(PGPASSWORD)@postgres-service.kisaansakhi.svc.cluster.local:5432/agripulse
            - name: DATABASE_SSL_MODE
              value: disable
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: kisaansakhi-secrets
                  key: SECRET_KEY
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 20

---
# =============================================================================
# Web Frontend — Service
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: kisaansakhi
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80

---
# =============================================================================
# Web Frontend — Deployment
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  namespace: kisaansakhi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ananyaas1230/kisaansakhi-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
