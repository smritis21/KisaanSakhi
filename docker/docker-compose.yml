version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agripulse_postgres
    environment:
      POSTGRES_USER: agripulse
      POSTGRES_PASSWORD: agripulse123
      POSTGRES_DB: agripulse
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
